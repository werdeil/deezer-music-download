<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deezer Music Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #ff6b00 0%, #ff9500 100%);
            color: #333;
        }

        .container {
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .header h1 {
            font-size: 16px;
            color: white;
            flex: 1;
        }

        .status-badge {
            background: white;
            color: #ff6b00;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-badge.success {
            background: #4caf50;
            color: white;
        }

        .status-badge.error {
            background: #f44336;
            color: white;
        }

        .section {
            background: white;
            border-radius: 8px;
            padding: 15px;
            /* margin-bottom: 15px; */
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .section_separator {
            height: 1px;
            margin: 10px 0;
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            color: #ff6b00;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 0 2px rgba(255, 107, 0, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        button {
            background: #ff6b00;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background: #ff5500;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(255, 107, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        button.secondary:hover {
            background: #e8e8e8;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .info-box {
            background: #f5f5f5;
            border-left: 3px solid #ff6b00;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            color: #666;
            margin-bottom: 10px;
        }

        .token-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .token-status .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            flex-shrink: 0;
        }

        .token-status.active .indicator {
            background: #4caf50;
        }

        .token-status .text {
            flex: 1;
            font-size: 12px;
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .url-input-group {
            display: flex;
            gap: 8px;
        }

        .url-input-group input {
            flex: 1;
        }

        .url-input-group button {
            flex: 0 0 auto;
            width: auto;
            padding: 8px 12px;
        }

        #downloadStatus {
            min-height: 30px;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        #downloadStatus.show {
            display: block;
        }

        #downloadStatus.success {
            background: #c8e6c9;
            color: #2e7d32;
            border-left: 3px solid #4caf50;
        }

        #downloadStatus.error {
            background: #ffcdd2;
            color: #c62828;
            border-left: 3px solid #f44336;
        }

        #downloadStatus.info {
            background: #bbdefb;
            color: #1565c0;
            border-left: 3px solid #2196f3;
        }

        .progress {
            width: 100%;
            height: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ff9500);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Deezer Music Download</h1>

            <div style="display:flex; align-items:center; gap:8px;">
                <div id="connectionStatus" class="status-badge" data-i18n="disconnected"></div>
                <button id="settingsToggle" class="secondary" style="width:auto; padding:6px 10px;">⚙️</button>
            </div>
        </div>

        <div id="mainView">
            <!-- Download Section -->
            <div class="section">
                <div class="section-title" data-i18n="sectionDownload"></div>
                
                <div class="form-group">
                    <label data-i18n="labelDeezerUrl"></label>
                    <div class="url-input-group">
                        <input 
                            type="text" 
                            id="deezerUrl" 
                            placeholder="https://www.deezer.com/album/123456"
                        >
                        <button id="extractBtn" style="width: auto; padding: 8px 12px;">📋</button>
                    </div>                </div>

                <div class="form-group">
                    <label data-i18n="labelContentId"></label>
                    <input type="text" id="contentId" placeholder="123456">
                </div>

                <button id="downloadBtn" style="margin-top: 10px;" data-i18n="btnDownload" data-i18n-prefix="⬇️ "></button>
                
                <div id="downloadStatus"></div>
                <div id="progressContainer" style="display: none; margin-top: 10px;">
                    <div class="progress">
                        <div id="progressBar" class="progress-bar" style="width: 0%">0%</div>
                    </div>
                </div>
            </div>
        </div>
        <div id="settingsView" style="display: none;">
            <!-- License Token Section -->
            <div class="section">
                <div class="section-title" data-i18n="sectionLicenseToken"></div>
                <div id="tokenStatus" class="token-status">
                    <div class="indicator"></div>
                    <div class="text">
                        <span id="tokenStatusText" data-i18n="tokenNone"></span>
                    </div>
                </div>
                <button id="refreshTokenBtn" class="secondary" style="margin-top: 10px;" data-i18n="btnRefresh" data-i18n-prefix="🔄 "></button>
            </div>
            <div class="section_separator"></div>
            <!-- Settings Section -->
            <div class="section">
                <div class="section-title" data-i18n="sectionServer"></div>
                
                <div class="form-group">
                    <label data-i18n="labelServerUrl"></label>
                    <input type="text" id="serverUrl" placeholder="http://localhost:8080">
                </div>

                <button id="saveSettingsBtn" class="secondary" data-i18n="btnSave" data-i18n-prefix="💾 "></button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
